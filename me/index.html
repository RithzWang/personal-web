<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">

    <meta property="og:title" content="Ridouan :(" />
    <meta property="og:description" content="Nothing to see here..." />

    <style>
        body {
            margin: 0;
            background-color: #121212; 
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;

            user-select: none;
            -webkit-user-select: none; 
        }

        .image-container {
            width: 100%;
            height: 100%;
            background-image: url('/pictures/393326927f757e07d786936ad5d1f35e.jpg');
            background-size: contain; /* Keeps the whole image visible */
            background-position: center;
            background-repeat: no-repeat;
        }
    </style>
</head>

<body oncontextmenu="return false;">
    
    <div class="image-container"></div>

    <script>
        document.addEventListener('keydown', function(event) {
            if (event.key === 'F12' || event.keyCode === 123) {
                event.preventDefault();
                return false;
            } (Windows) or Cmd+Option+I (Mac) for DevTools
            if ((event.ctrlKey || event.metaKey) && event.shiftKey && (event.key === 'I' || event.key === 'i')) {
                event.preventDefault();
                return false;
            }
            if ((event.ctrlKey || event.metaKey) && event.shiftKey && (event.key === 'C' || event.key === 'c')) {
                event.preventDefault();
                return false;
            }
            if ((event.ctrlKey || event.metaKey) && (event.key === 'U' || event.key === 'u')) {
                event.preventDefault();
                return false;
            }
        });
    </script>
</body>
</html>
